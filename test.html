<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 單字特訓</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f5f5f7; color: #1d1d1f; }
        .nav { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; background-color: #0071e3; color: white; cursor: pointer; font-size: 16px; transition: 0.2s; font-weight: bold; }
        button:hover { background-color: #0077ed; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        button.secondary { background-color: #e8e8ed; color: #1d1d1f; }
        button.secondary:hover { background-color: #d1d1d6; }
        button.danger { background-color: #ff3b30; }
        button.star-btn { background-color: #fff9db; color: #f59f00; border: 1px solid #fcc419; }
        button.star-btn:hover { background-color: #ffec99; }
        button.icon-btn { background: none; color: #0071e3; padding: 0 10px; font-size: 24px; vertical-align: middle; }
        button.icon-btn:hover { background: #e8e8ed; }
        .section { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section.active { display: block; }
        .word-container { display: flex; align-items: center; margin-bottom: 5px; }
        .word-display { font-size: 32px; font-weight: bold; }
        .pos-display { font-size: 18px; color: #86868b; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { background-color: #f5f5f7; color: #1d1d1f; text-align: left; font-weight: normal; }
        .feedback { margin-top: 15px; font-weight: bold; }
        
        /* 儀表板與清單樣式 */
        .dashboard-stats { background-color: #f5f5f7; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .dashboard-stats p { margin: 8px 0; font-size: 15px; color: #333; display: flex; justify-content: space-between;}
        .dashboard-stats strong { color: #0071e3; }
        .dashboard-stats .star-text { color: #f59f00; }
        
        .list-container { list-style: none; padding: 0; margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .list-item { padding: 12px; border-bottom: 1px solid #e8e8ed; display: flex; justify-content: space-between; align-items: center; }
        .list-item:last-child { border-bottom: none; }
        .list-item-text { font-size: 16px; }
        .remove-btn { padding: 6px 12px; font-size: 14px; border-radius: 6px; font-weight: normal; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="switchTab('home')" class="secondary">🏠 首頁</button>
        <button onclick="switchTab('notebook')" class="secondary">📓 錯題本</button>
        <button onclick="switchTab('starred')" class="secondary">⭐ 已會單字</button>
    </div>

    <div id="home" class="section active">
        <h1 style="margin-top: 0;">TOEIC 單字特訓</h1>
        
        <div class="dashboard-stats">
            <p>📖 順序背單字進度：<strong id="stat-seq">0 / 0</strong></p>
            <p>🎲 隨機背單字探索：<strong><span id="stat-rand">0</span> 詞</strong></p>
            <p>📝 測驗模式已考過：<strong><span id="stat-quiz">0</span> 題</strong></p>
            <p>📓 錯題本需要加強：<strong><span id="stat-notebook">0</span> 詞</strong></p>
            <p>⭐ 標記為熟詞已會：<strong class="star-text"><span id="stat-starred">0</span> 詞</strong></p>
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="switchTab('quiz')" style="flex:1;">開始測驗</button>
            <button onclick="switchTab('study')" class="secondary" style="flex:1;">背單字</button>
        </div>
    </div>

    <div id="quiz" class="section">
        <div class="header-flex">
            <h2>測驗模式</h2>
            <div id="quiz-counter" style="color: #86868b; font-weight: bold; font-size: 14px;"></div>
        </div>
        <div id="quiz-content"></div>
        <div id="quiz-feedback" class="feedback"></div>
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="add-to-notebook-btn" class="secondary" style="display:none; flex: 1;" onclick="addCurrentToNotebook()">矇對的，加錯題</button>
            <button id="add-star-quiz-btn" class="star-btn" style="display:none; flex: 1;" onclick="addStarInQuiz()">⭐ 真的會，加星號</button>
        </div>
        <button id="next-quiz-btn" style="display:none; margin-top:10px; width: 100%;" onclick="initQuiz()">下一題</button>
    </div>

    <div id="study" class="section">
        <div class="header-flex">
            <h2 id="study-title" style="margin-bottom: 10px;">背單字模式</h2>
            <div id="study-counter" style="color: #86868b; font-weight: bold; font-size: 14px;"></div>
        </div>
        
        <div id="study-controls" style="margin-bottom: 15px;">
            <button class="secondary" onclick="startStudy('random', 'all')">隨機抽背</button>
            <button class="secondary" onclick="startStudy('sequential', 'all')">依序背誦</button>
        </div>
        
        <div id="study-content" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e8e8ed;">
            <div class="word-container">
                <div id="study-word" class="word-display"></div>
                <button class="icon-btn" onclick="if(studyCurrentWord) speakText(studyCurrentWord.word)">🔊</button>
                <button class="icon-btn" id="study-star-btn" style="margin-left: auto; font-size: 28px;" onclick="toggleStudyStar()">☆</button>
            </div>
            <div id="study-pos" class="pos-display"></div>
            <div id="study-meaning" style="font-size: 24px; margin-bottom: 20px; display: none;"></div>
            
            <div style="display: flex; gap: 10px;">
                <button id="show-meaning-btn" style="flex:1;" onclick="toggleMeaning()">顯示中文</button>
                <button class="secondary" style="flex:1;" onclick="nextStudyWord()">下一個</button>
            </div>
        </div>
    </div>

    <div id="notebook" class="section">
        <div class="header-flex">
            <h2>錯題本</h2>
            <button class="danger" style="padding: 5px 10px; font-size: 14px;" onclick="clearNotebook()">清空全部</button>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="secondary" style="flex:1;" onclick="startNotebookStudy()">依序複習</button>
            <button class="secondary" style="flex:1;" onclick="startNotebookQuiz()">錯題測驗</button>
        </div>
        <ul id="notebook-list" class="list-container"></ul>
    </div>

    <div id="starred" class="section">
        <div class="header-flex">
            <h2>⭐ 已會單字</h2>
            <span style="color: #86868b; font-size: 14px;">不考熟詞，效率更高</span>
        </div>
        <p style="margin-bottom: 15px;">這裡的單字在「全題庫測驗」時會被自動過濾掉。</p>
        <ul id="starred-list" class="list-container"></ul>
    </div>

<script>
    let wordsData = [];
    let wrongBook = JSON.parse(localStorage.getItem('wrongBook')) || [];
    let starredWordIds = JSON.parse(localStorage.getItem('starredWordIds')) || []; // 只存 ID 以節省空間
    
    // 進度追蹤
    let studyProgress = parseInt(localStorage.getItem('studyProgress')) || 0;
    let seenStudyWords = JSON.parse(localStorage.getItem('seenStudyWords')) || [];
    let seenQuizWords = JSON.parse(localStorage.getItem('seenQuizWords')) || [];
    let notebookStudyProgress = 0; 
    
    let quizCurrentWord = null;
    let studyCurrentWord = null;
    let isStudyRandom = true;
    let currentQuizSource = null;
    let currentStudySource = null;

    // 發音功能
    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        } else {
            alert('你的瀏覽器不支援發音功能喔！');
        }
    }

    // 更新首頁儀表板數字
    function updateDashboardStats() {
        if(wordsData.length === 0) return;
        document.getElementById('stat-seq').innerText = `${studyProgress} / ${wordsData.length}`;
        document.getElementById('stat-rand').innerText = seenStudyWords.length;
        document.getElementById('stat-quiz').innerText = seenQuizWords.length;
        document.getElementById('stat-notebook').innerText = wrongBook.length;
        document.getElementById('stat-starred').innerText = starredWordIds.length;
    }

    const initData = async () => {
        try {
            const res = await fetch('words.json');
            if (!res.ok) throw new Error('Network response was not ok');
            wordsData = await res.json();
            updateNotebookView();
            updateStarredView();
            updateDashboardStats();
        } catch (e) {
            document.getElementById('home').innerHTML = "<p style='color:red; margin-top:20px;'>無法讀取 words.json，請確認你是否已經透過 python -m http.server 啟動本地伺服器。</p>";
        }
    };

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        
        if(tabId === 'home') updateDashboardStats();
        if(tabId === 'notebook') updateNotebookView();
        if(tabId === 'starred') updateStarredView();
        
        if(tabId === 'quiz') {
            initQuiz(wordsData);
        }
        if(tabId === 'study') {
            document.getElementById('study-title').innerText = "背單字模式";
            document.getElementById('study-controls').style.display = 'block';
            document.getElementById('study-content').style.display = 'none';
            document.getElementById('study-counter').innerText = '';
        }
    }

    // --- 星號邏輯 (Study Mode) ---
    function toggleStudyStar() {
        if(!studyCurrentWord) return;
        const id = studyCurrentWord.id;
        const btn = document.getElementById('study-star-btn');
        
        if (starredWordIds.includes(id)) {
            // 取消星號
            starredWordIds = starredWordIds.filter(x => x !== id);
            btn.innerText = '☆';
        } else {
            // 加星號
            starredWordIds.push(id);
            btn.innerText = '⭐';
            // 如果這題原本在錯題本，既然會了就把它從錯題本移除
            removeFromNotebook(id, true);
        }
        localStorage.setItem('starredWordIds', JSON.stringify(starredWordIds));
        updateDashboardStats();
    }

    // --- 星號邏輯 (Quiz Mode) ---
    function addStarInQuiz() {
        if (!starredWordIds.includes(quizCurrentWord.id)) {
            starredWordIds.push(quizCurrentWord.id);
            localStorage.setItem('starredWordIds', JSON.stringify(starredWordIds));
            removeFromNotebook(quizCurrentWord.id, true);
        }
        
        const starBtn = document.getElementById('add-star-quiz-btn');
        starBtn.innerText = "已加星號 ⭐";
        starBtn.disabled = true;
        
        // 既然會了，就隱藏加錯題的按鈕
        document.getElementById('add-to-notebook-btn').style.display = 'none';
        updateDashboardStats();
    }

    // --- 測驗模式 ---
    function initQuiz(sourceArray = wordsData) {
        currentQuizSource = sourceArray;
        document.getElementById('quiz-feedback').innerHTML = '';
        
        // 重置按鈕狀態
        const addWrongBtn = document.getElementById('add-to-notebook-btn');
        addWrongBtn.style.display = 'none';
        addWrongBtn.innerText = "矇對的，加錯題";
        addWrongBtn.style.color = "";
        addWrongBtn.disabled = false;
        
        const addStarBtn = document.getElementById('add-star-quiz-btn');
        addStarBtn.style.display = 'none';
        addStarBtn.innerText = "⭐ 真的會，加星號";
        addStarBtn.disabled = false;
        
        document.getElementById('next-quiz-btn').style.display = 'none';
        
        // **過濾星號單字**
        let availableWords = sourceArray;
        if (sourceArray === wordsData) {
            // 如果是全題庫測驗，剃除已經加星號的單字
            availableWords = wordsData.filter(w => !starredWordIds.includes(w.id));
        }

        if(availableWords.length === 0) {
            document.getElementById('quiz-content').innerHTML = "<h3 style='text-align:center; margin-top:40px;'>太神啦！🎉<br><br>這份題庫裡的單字你全都會了！</h3>";
            return;
        }
        
        quizCurrentWord = availableWords[Math.floor(Math.random() * availableWords.length)];
        
        if (currentQuizSource === wordsData && !seenQuizWords.includes(quizCurrentWord.id)) {
            seenQuizWords.push(quizCurrentWord.id);
            localStorage.setItem('seenQuizWords', JSON.stringify(seenQuizWords));
        }
        
        const counterEl = document.getElementById('quiz-counter');
        if (currentQuizSource === wordsData) {
            counterEl.innerText = `待考單字: ${availableWords.length}`;
        } else {
            counterEl.innerText = `錯題測驗中`;
        }
        
        // 產生選項 (從全題庫抓干擾選項比較真實)
        let options = new Set([quizCurrentWord]);
        while(options.size < 5) {
            let randomWord = wordsData[Math.floor(Math.random() * wordsData.length)];
            options.add(randomWord);
        }
        options = Array.from(options).sort(() => Math.random() - 0.5);

        let html = `
            <div class="word-container">
                <div class="word-display">${quizCurrentWord.word}</div>
                <button class="icon-btn" onclick="speakText('${quizCurrentWord.word.replace(/'/g, "\\'")}')">🔊</button>
            </div>`;
        html += `<div class="pos-display">${quizCurrentWord.詞性 || ''}</div>`;
        html += `<div class="options">`;
        options.forEach(opt => {
            html += `<button class="option-btn" onclick="checkAnswer(${opt.id}, this)">${opt.meaning}</button>`;
        });
        html += `</div>`;
        
        document.getElementById('quiz-content').innerHTML = html;
    }

    function checkAnswer(selectedId, btnElement) {
        if(document.getElementById('next-quiz-btn').style.display === 'inline-block') return;

        if (selectedId === quizCurrentWord.id) {
            btnElement.style.backgroundColor = '#34c759';
            btnElement.style.color = 'white';
            document.getElementById('quiz-feedback').innerHTML = '<span style="color:#34c759">答對了！</span>';
            
            // 答對時，同時顯示「矇對加錯題」與「會了加星號」
            if (currentQuizSource === wordsData) {
                document.getElementById('add-to-notebook-btn').style.display = 'inline-block';
                document.getElementById('add-star-quiz-btn').style.display = 'inline-block';
            }
        } else {
            btnElement.style.backgroundColor = '#ff3b30';
            btnElement.style.color = 'white';
            document.getElementById('quiz-feedback').innerHTML = `<span style="color:#ff3b30">答錯了，正確答案是：${quizCurrentWord.meaning}</span>`;
            if (currentQuizSource === wordsData) {
                addCurrentToNotebook(true); 
            }
        }
        
        document.querySelectorAll('.option-btn').forEach(btn => {
            if(btn.innerText === quizCurrentWord.meaning) {
                btn.style.backgroundColor = '#34c759';
                btn.style.color = 'white';
            }
        });

        document.getElementById('next-quiz-btn').style.display = 'inline-block';
    }

    // --- 錯題本與星號列表邏輯 ---
    function addCurrentToNotebook(silent = false) {
        const btn = document.getElementById('add-to-notebook-btn');
        if (!wrongBook.find(w => w.id === quizCurrentWord.id)) {
            wrongBook.push(quizCurrentWord);
            localStorage.setItem('wrongBook', JSON.stringify(wrongBook));
        }
        btn.innerText = "已加錯題 ✓";
        btn.style.color = "#ff3b30";
        btn.disabled = true;
        
        // 既然加了錯題，就不應該讓它能加星號
        document.getElementById('add-star-quiz-btn').style.display = 'none';
        
        updateNotebookView();
        updateDashboardStats();
    }

    function updateNotebookView() {
        const listEl = document.getElementById('notebook-list');
        if (wrongBook.length === 0) {
            listEl.innerHTML = '<p style="color:#86868b; text-align:center; padding: 20px 0;">目前沒有錯題記錄，繼續保持！</p>';
            return;
        }
        let listHtml = '';
        wrongBook.forEach(w => {
            listHtml += `
                <li class="list-item">
                    <div class="list-item-text">
                        <strong>${w.word}</strong> <span style="color:#86868b; font-size:14px;">${w.詞性 || ''}</span> - ${w.meaning}
                    </div>
                    <button class="secondary remove-btn" onclick="removeFromNotebook(${w.id})">移除</button>
                </li>
            `;
        });
        listEl.innerHTML = listHtml;
    }

    function updateStarredView() {
        const listEl = document.getElementById('starred-list');
        if (starredWordIds.length === 0) {
            listEl.innerHTML = '<p style="color:#86868b; text-align:center; padding: 20px 0;">還沒有標記任何熟詞，趕快去背單字吧！</p>';
            return;
        }
        
        // 把存的 IDs 還原成單字物件來顯示
        const starredWords = wordsData.filter(w => starredWordIds.includes(w.id));
        
        let listHtml = '';
        starredWords.forEach(w => {
            listHtml += `
                <li class="list-item">
                    <div class="list-item-text">
                        <strong>${w.word}</strong> <span style="color:#86868b; font-size:14px;">${w.詞性 || ''}</span> - ${w.meaning}
                    </div>
                    <button class="secondary remove-btn" onclick="removeFromStarred(${w.id})">取消星號</button>
                </li>
            `;
        });
        listEl.innerHTML = listHtml;
    }

    function removeFromNotebook(id, silent = false) {
        wrongBook = wrongBook.filter(w => w.id !== id);
        localStorage.setItem('wrongBook', JSON.stringify(wrongBook));
        if(!silent) {
            updateNotebookView();
            updateDashboardStats();
        }
    }
    
    function removeFromStarred(id) {
        starredWordIds = starredWordIds.filter(x => x !== id);
        localStorage.setItem('starredWordIds', JSON.stringify(starredWordIds));
        updateStarredView();
        updateDashboardStats();
    }

    function clearNotebook() {
        if (wrongBook.length === 0) return;
        if (confirm("確定要清空所有的錯題本記錄嗎？")) {
            wrongBook = [];
            localStorage.setItem('wrongBook', JSON.stringify(wrongBook));
            updateNotebookView();
            updateDashboardStats();
        }
    }

    function startNotebookQuiz() {
        if(wrongBook.length < 5) {
            alert("錯題本裡的單字至少需要 5 個才能測驗喔！");
            return;
        }
        switchTab('quiz');
        initQuiz(wrongBook);
    }
    
    function startNotebookStudy() {
        if(wrongBook.length === 0) {
            alert("錯題本目前是空的喔！");
            return;
        }
        switchTab('study');
        document.getElementById('study-title').innerText = "錯題本複習";
        document.getElementById('study-controls').style.display = 'none'; 
        
        notebookStudyProgress = 0; 
        startStudy('sequential', 'notebook');
    }

    // --- 背單字模式 ---
    function startStudy(mode, source) {
        if (source === 'notebook') {
            currentStudySource = wrongBook;
            isStudyRandom = false; 
        } else {
            currentStudySource = wordsData;
            isStudyRandom = (mode === 'random');
        }
        
        document.getElementById('study-content').style.display = 'block';
        renderStudyWord();
    }

    function renderStudyWord() {
        if(currentStudySource.length === 0) return;
        
        const counterEl = document.getElementById('study-counter');
        const starBtn = document.getElementById('study-star-btn');
        
        if (isStudyRandom) {
            studyCurrentWord = currentStudySource[Math.floor(Math.random() * currentStudySource.length)];
            
            if (currentStudySource === wordsData && !seenStudyWords.includes(studyCurrentWord.id)) {
                seenStudyWords.push(studyCurrentWord.id);
                localStorage.setItem('seenStudyWords', JSON.stringify(seenStudyWords));
            }
            counterEl.innerText = `已看過: ${seenStudyWords.length} / ${wordsData.length}`;
            
        } else {
            if (currentStudySource === wrongBook) {
                studyCurrentWord = wrongBook[notebookStudyProgress % wrongBook.length];
                counterEl.innerText = `${(notebookStudyProgress % wrongBook.length) + 1} / ${wrongBook.length}`;
            } else {
                studyCurrentWord = wordsData[studyProgress % wordsData.length];
                counterEl.innerText = `${(studyProgress % wordsData.length) + 1} / ${wordsData.length}`;
            }
        }

        document.getElementById('study-word').innerText = studyCurrentWord.word;
        document.getElementById('study-pos').innerText = studyCurrentWord.詞性 || '';
        document.getElementById('study-meaning').innerText = studyCurrentWord.meaning;
        
        // 渲染星星狀態
        if (starredWordIds.includes(studyCurrentWord.id)) {
            starBtn.innerText = '⭐';
        } else {
            starBtn.innerText = '☆';
        }
        
        document.getElementById('study-meaning').style.display = 'none';
        document.getElementById('show-meaning-btn').innerText = '顯示中文';
    }

    function toggleMeaning() {
        const meaningEl = document.getElementById('study-meaning');
        const btnEl = document.getElementById('show-meaning-btn');
        if (meaningEl.style.display === 'none') {
            meaningEl.style.display = 'block';
            btnEl.innerText = '隱藏中文';
        } else {
            meaningEl.style.display = 'none';
            btnEl.innerText = '顯示中文';
        }
    }

    function nextStudyWord() {
        if (!isStudyRandom) {
            if (currentStudySource === wrongBook) {
                notebookStudyProgress++;
            } else {
                studyProgress++;
                localStorage.setItem('studyProgress', studyProgress);
            }
        }
        renderStudyWord();
    }

    initData();
</script>
</body>
</html>
